<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NU Project PAWS - Guidance Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Appointment form stylesheet -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Header -->
      <header>
        <div class="header-container">
          <div class="header-left">
            <a href="home.html">
              <img id="logo-header" src="../images/nu_logo.png" alt="NU Logo" />
            </a>
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="header-right">Guidance Office Appointment</div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <!-- Back Button (outside the form box, top-left corner) -->
        <button type="button" class="back-btn">← Back</button>

        <!-- Appointment Form -->
        <section class="appointment-form">
          <h2>Guidance Office Appointment</h2>

          <!-- Dropdown -->
          <div class="form-group">
            <label for="appointmentType">Select Appointment Type:</label>
            <select id="appointmentType" name="appointmentType" required>
              <option value="" disabled selected>Select...</option>
              <option value="guidance">Guidance Office Appointment</option>
              <option value="counseling">Counseling Session</option>
              <option value="clearance">Clearance Signing</option>
            </select>
          </div>

          <!-- Guidance Appointment Form -->
          <form id="guidanceForm" class="hidden">
            <!-- File Upload -->
            <label for="requestForm">Online Appointment Request Form:</label>
            <input
              type="file"
              id="requestForm"
              name="requestForm"
              accept=".pdf,.doc,.docx,.jpg,.png"
              required
            />

            <!-- Student ID and Contact -->
            <label for="studentId">Student ID Number:</label>
            <input
              type="text"
              id="studentId"
              name="studentId"
              placeholder="Enter your ID number"
              required
            />

            <label for="contact">Contact Details:</label>
            <input
              type="text"
              id="contact"
              name="contact"
              placeholder="Enter phone/email"
              required
            />

            <!-- Reason -->
            <label for="reason">Reason for Appointment:</label>
            <select id="reason" name="reason" required>
              <option value="" disabled selected>Select...</option>
              <option value="document">Document Request</option>
              <option value="counseling">Counseling</option>
              <option value="clearance">Clearance</option>
              <option value="other">Other</option>
            </select>

            <!-- Preferred Date/Time -->
            <fieldset>
              <legend>Preferred Schedule</legend>
              <label for="preferredDate">Date:</label>
              <input
                type="date"
                id="preferredDate"
                name="preferredDate"
                required
              />

              <label for="preferredTime">Time:</label>
              <input
                type="time"
                id="preferredTime"
                name="preferredTime"
                required
              />
            </fieldset>

            <!-- Submit -->
            <button type="submit" class="submit-btn">
              Submit Appointment Request
            </button>
          </form>
        </section>
      </main>

      <!-- Footer -->
      <footer>
        <div class="footer-container">
          <div class="footer-left">
            <img id="logo-footer" src="../images/nu_logo.png" alt="NU Logo" />
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="footer-center">
            <div class="footer-top">
              🛈 ABOUT NU ONLINE SERVICES <br />
              All Rights Reserved © 2026 National University
            </div>
            <hr class="footer-divider" />
            <div class="footer-bottom">
              NU Online Services is a portal of all online applications National
              University offers.
            </div>
          </div>
          <div class="footer-right">
            <h4>Follow Us</h4>
            <p>FB | IG | TW</p>
          </div>
        </div>
      </footer>
    </div>
    <script src="../javascript/index.js"></script>
  </body>
</html>

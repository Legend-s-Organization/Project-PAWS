<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NU Project PAWS - Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Global stylesheet -->
  <link rel="stylesheet" href="../css/style.css">
  <!-- Page-specific stylesheet -->
  <link rel="stylesheet" href="../css/pages/sign-up.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <img src="../images/nu_logo.png" class="login-logo" alt="NU Logo">
      <h2>Create Account</h2>
      <p>Fill in the details below to register</p>

      <form id="signupForm">
        <input type="text" id="newUsername" placeholder="Choose a Student ID" required>
        <input type="password" id="newPassword" placeholder="Choose a Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

        <button type="submit">Sign Up</button>
        <p class="error" id="signupError"></p>
        <p class="success" id="signupSuccess"></p>
      </form>

      <a href="../index.html" class="forgot">Already have an account? Log in</a>
    </div>
  </div>

  <script src="../javascript/index.js"></script>
</body>
</html>

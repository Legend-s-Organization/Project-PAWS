<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NU Project PAWS - Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Master stylesheet -->
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .profile-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .profile-icon {
        font-size: 80px;
        margin-bottom: 20px;
      }
      .profile-info {
        text-align: left;
        margin-top: 30px;
      }
      .profile-info div {
        margin-bottom: 15px;
        padding: 10px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
      }
      .profile-info label {
        font-weight: bold;
        color: #002b5c;
      }
      .profile-info span {
        color: #555;
      }
      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #34418e;
        text-decoration: none;
        font-weight: bold;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Side Menu -->
      <div id="sideMenu" class="side-menu"></div>
      <div id="menuOverlay" class="menu-overlay"></div>

      <!-- Header -->
      <header>
        <div class="header-container">
          <div class="header-left">
            <button id="menuToggle" class="menu-toggle">☰</button>
            <a href="home.html" id="headerHomeLink">
              <img id="logo-header" src="../images/nu_logo.png" alt="NU Logo" />
            </a>
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="header-right">
            <button
              id="logoutBtn"
              style="
                background: none;
                border: 1px solid white;
                color: white;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Logout
            </button>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <div class="profile-container">
          <div class="profile-icon">👤</div>
          <h2>My Profile</h2>

          <div class="profile-info">
            <div>
              <label>Username / ID:</label>
              <span id="profileUser">---</span>
            </div>
            <div>
              <label>Account Role:</label>
              <span id="profileRole">---</span>
            </div>
            <div>
              <label>Status:</label>
              <span>Active</span>
            </div>
          </div>

          <a href="#" class="back-link" onclick="history.back()">← Go Back</a>
        </div>
      </main>

      <!-- Footer -->
      <footer>
        <div class="footer-container">
          <div class="footer-left">
            <img id="logo-footer" src="../images/nu_logo.png" alt="NU Logo" />
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="footer-center">
            <div class="footer-top">
              🛈 ABOUT NU ONLINE SERVICES <br />
              All Rights Reserved © 2026 National University
            </div>
            <hr class="footer-divider" />
            <div class="footer-bottom">
              NU Online Services is a portal of all online applications National
              University offers.
            </div>
          </div>
          <div class="footer-right">
            <h4>Follow Us</h4>
            <p>FB | IG | TW</p>
          </div>
        </div>
      </footer>
    </div>
    <script src="../javascript/index.js"></script>
  </body>
</html>

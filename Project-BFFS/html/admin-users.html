<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NU Project PAWS - User Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Master stylesheet -->
    <link rel="stylesheet" href="../css/style.css" />
    <!-- Admin stylesheet -->
    <link rel="stylesheet" href="../css/pages/admin.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Side Menu -->
      <div id="sideMenu" class="side-menu"></div>
      <div id="menuOverlay" class="menu-overlay"></div>

      <!-- Header -->
      <header>
        <div class="header-container">
          <div class="header-left">
            <button id="menuToggle" class="menu-toggle">☰</button>
            <a href="admin-home.html">
              <img id="logo-header" src="../images/nu_logo.png" alt="NU Logo" />
            </a>
            <span class="school-name">NU EAST ORTIGAS (ADMIN)</span>
          </div>
          <div class="header-right">
            <button
              id="logoutBtn"
              style="
                background: none;
                border: 1px solid white;
                color: white;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Logout
            </button>
          </div>
        </div>
      </header>

      <main class="page-content">
        <div class="admin-container">
          <div class="back-btn-container">
            <button
              class="back-btn"
              onclick="location.href = 'admin-home.html'"
            >
              ← Back to Dashboard
            </button>
          </div>

          <h2>User Account Management</h2>
          <p>Manage student accounts registered in the system.</p>

          <div
            class="search-filters"
            style="
              margin-bottom: 20px;
              display: flex;
              gap: 10px;
              flex-wrap: wrap;
            "
          >
            <input
              type="text"
              id="userSearch"
              placeholder="Search Student ID..."
              style="
                padding: 8px;
                flex: 1;
                min-width: 200px;
                border: 1px solid #ccc;
                border-radius: 4px;
              "
            />
            <select
              id="gradeFilter"
              style="padding: 8px; border: 1px solid #ccc; border-radius: 4px"
            >
              <option value="">All Grade Levels</option>
              <option value="Senior High">Senior High</option>
              <option value="College">College</option>
            </select>
          </div>

          <table class="admin-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Grade Level</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <!-- Users will be populated here by JavaScript -->
            </tbody>
          </table>
        </div>
      </main>

      <!-- Edit User Modal -->
      <div id="editModal" class="modal">
        <div class="modal-content">
          <h3>Edit User Account</h3>
          <label for="editUsername">Student ID</label>
          <input type="text" id="editUsername" placeholder="Enter Student ID" />
          <label for="editPassword">Password</label>
          <input type="text" id="editPassword" placeholder="Enter Password" />

          <div class="modal-actions">
            <button id="cancelEditBtn" class="cancel-btn">Cancel</button>
            <button id="saveUserBtn" class="save-btn">Save Changes</button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer>
        <div class="footer-container">
          <div class="footer-left">
            <img id="logo-footer" src="../images/nu_logo.png" alt="NU Logo" />
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="footer-center">
            <div class="footer-top">
              🛈 ABOUT NU ONLINE SERVICES <br />
              All Rights Reserved © 2026 National University
            </div>
            <hr class="footer-divider" />
            <div class="footer-bottom">ADMINISTRATIVE PORTAL</div>
          </div>
          <div class="footer-right">
            <h4>Follow Us</h4>
            <p>FB | IG | TW</p>
          </div>
        </div>
      </footer>
    </div>

    <!-- Main JS for protection/logout -->
    <script src="../javascript/index.js"></script>
    <!-- Admin-specific JS -->
    <script src="../javascript/admin.js"></script>
  </body>
</html>

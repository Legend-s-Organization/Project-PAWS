<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NU Project PAWS - Permit Submission</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Permit form stylesheet -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Side Menu (Empty) -->
      <div id="sideMenu" class="side-menu"></div>
      <div id="menuOverlay" class="menu-overlay"></div>

      <!-- Header -->
      <header>
        <div class="header-container">
          <div class="header-left">
            <button id="menuToggle" class="menu-toggle">☰</button>
            <a href="home.html">
              <img id="logo-header" src="../images/nu_logo.png" alt="NU Logo" />
            </a>
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="header-right">
            <button
              id="logoutBtn"
              style="
                background: none;
                border: 1px solid white;
                color: white;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Logout
            </button>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <!-- Back Button (outside the form box, top-left corner) -->
        <button type="button" class="back-btn">← Back</button>

        <!-- Permit Form Section -->
        <section class="permit-form">
          <h2>Permit Submission</h2>

          <!-- Dropdown -->
          <div class="form-group">
            <label for="permitType">Select Permit Type:</label>
            <select id="permitType" name="permitType" required>
              <option value="" disabled selected>Select...</option>
              <option value="eventPermit">
                Event/Activity Permit (Student Org)
              </option>
            </select>
          </div>

          <!-- Event Permit Form -->
          <form id="eventPermitForm" class="hidden">
            <!-- Request Form Upload -->
            <label for="requestForm">Filled-out Request Form:</label>
            <input
              type="file"
              id="requestForm"
              name="requestForm"
              accept=".pdf,.doc,.docx,.jpg,.png"
              required
            />

            <!-- Student ID Upload -->
            <label for="studentId"
              >Valid Student ID / Registration Proof:</label
            >
            <input
              type="file"
              id="studentId"
              name="studentId"
              accept=".pdf,.jpg,.png"
              required
            />

            <!-- Endorsement Upload -->
            <label for="endorsement"
              >Endorsement/Approval (Dept. Head/Adviser):</label
            >
            <input
              type="file"
              id="endorsement"
              name="endorsement"
              accept=".pdf,.jpg,.png"
              required
            />

            <!-- Event Details -->
            <fieldset>
              <legend>Event Details</legend>

              <label for="eventDate">Date:</label>
              <input type="date" id="eventDate" name="eventDate" required />

              <label for="purpose">Purpose:</label>
              <textarea
                id="purpose"
                name="purpose"
                rows="3"
                placeholder="Describe purpose..."
                required
              ></textarea>
            </fieldset>

            <!-- Submit -->
            <button type="submit" class="submit-btn">
              Submit Event Permit Request
            </button>
          </form>
        </section>
      </main>

      <!-- Footer -->
      <footer>
        <div class="footer-container">
          <div class="footer-left">
            <img id="logo-footer" src="../images/nu_logo.png" alt="NU Logo" />
            <span class="school-name">NU EAST ORTIGAS</span>
          </div>
          <div class="footer-center">
            <div class="footer-top">
              🛈 ABOUT NU ONLINE SERVICES <br />
              All Rights Reserved © 2026 National University
            </div>
            <hr class="footer-divider" />
            <div class="footer-bottom">
              NU Online Services is a portal of all online applications National
              University offers.
            </div>
          </div>
          <div class="footer-right">
            <h4>Follow Us</h4>
            <p>FB | IG | TW</p>
          </div>
        </div>
      </footer>
    </div>
    <script src="../javascript/index.js"></script>
  </body>
</html>
